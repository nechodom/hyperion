name: Build and publish release binaries

# Trigger on every push to main (ships the rolling build operators pull via
# update.sh), on `v*` tags (cuts a versioned GitHub release — `git tag v1.2.0
# && git push --tags`), and on manual dispatch.
on:
  push:
    branches: [main]
    tags: ['v[0-9]*']
  workflow_dispatch:

permissions:
  contents: write   # required to create + overwrite the rolling release

# Cancel in-flight builds when a new commit lands — only the latest
# main matters for a rolling release. Keyed by ref so a `v*` tag build
# never cancels (or is cancelled by) the main build.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Belt + suspenders alongside the per-action major-version bumps
# below. GitHub will deprecate Node 20 on Sept 16 2026; this env
# pre-emptively forces every JS action (including transitive ones
# we haven't audited like Swatinem/rust-cache) to run on Node 24,
# so we don't get warning spam in the meantime and the actual
# cutover is a no-op.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-22.04   # glibc 2.35; binaries run on Debian 12 (glibc 2.36+)
    steps:
      - name: Checkout
        # v6 runs on Node 24 — see
        # github.com/actions/checkout/releases/tag/v6.0.0. Old v4
        # was flagged by the Sept 2025 Node-20 deprecation notice.
        uses: actions/checkout@v6
        with:
          fetch-depth: 0    # we need the commit history for SHA-based naming

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release binaries
        # Stamp the exact commit into the binaries (build.rs reads this env
        # first). Without it the build.rs git-fallback would still work in CI,
        # but being explicit guarantees `--version` and the published VERSION
        # asset agree, which is what update.sh's staleness guard relies on.
        env:
          HYPERION_GIT_SHA: ${{ github.sha }}
          # On a `v*` tag build, stamp the clean tag (e.g. `v1.2.0`) as the
          # describe string so the binary's `--version` is exactly the release
          # name. On a main push this is empty, so build.rs's `git describe`
          # computes `vX.Y.Z-N-gSHA` from the full history fetched above.
          HYPERION_DESCRIBE: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          cargo build --release \
            --bin hyperion-agent \
            --bin hyperion-web \
            --bin hctl
          ls -lh target/release/{hyperion-agent,hyperion-web,hctl}

      - name: Stage build artefacts + checksums
        run: |
          mkdir -p dist
          cp target/release/hyperion-agent dist/
          cp target/release/hyperion-web   dist/
          cp target/release/hctl           dist/
          # VERSION = the exact commit these binaries were built from. update.sh
          # fetches just this tiny file to decide whether the rolling release is
          # current with the node's source HEAD before trusting the pre-built
          # binaries (a 12 MB download) — closing the "pulled mid-CI-build, got a
          # commit behind" race.
          printf '%s\n' "${{ github.sha }}" > dist/VERSION
          ( cd dist && sha256sum hyperion-agent hyperion-web hctl > SHA256SUMS )
          cat dist/SHA256SUMS dist/VERSION

      - name: Compute version metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # Same git-describe build.rs stamps into the binary — shown in the
          # release body so the human version is visible at a glance.
          DESCRIBE=$(git describe --tags --match 'v[0-9]*' --always)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "describe=$DESCRIBE" >> "$GITHUB_OUTPUT"

      - name: Publish rolling release
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        # v3 runs on Node 24 — see
        # github.com/softprops/action-gh-release/releases/tag/v3.0.0
        # ("Move the action runtime and bundle target to Node 24").
        uses: softprops/action-gh-release@v3
        with:
          tag_name: rolling
          name: "Rolling build (latest main)"
          body: |
            Auto-built rolling release. Always tracks `main`.

            - **version**: `${{ steps.meta.outputs.describe }}`
            - **commit**: `${{ github.sha }}` (`${{ steps.meta.outputs.short_sha }}`)
            - **built**: ${{ steps.meta.outputs.build_date }}
            - **runner**: ubuntu-22.04 · glibc 2.35
            - **target**: x86_64-unknown-linux-gnu (Debian 12+ compatible)

            ```
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/rolling/hyperion-agent -o /usr/sbin/hyperion-agent
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/rolling/hyperion-web   -o /usr/sbin/hyperion-web
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/rolling/hctl           -o /usr/bin/hctl
            ```

            But the recommended path is `sudo /opt/hyperion/packaging/install/update.sh` — it auto-detects this release and falls back to local build if unavailable.

            **Checksums** (`SHA256SUMS`) are uploaded alongside the binaries.
          files: |
            dist/hyperion-agent
            dist/hyperion-web
            dist/hctl
            dist/SHA256SUMS
            dist/VERSION
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish versioned release
        # A `v*` tag cuts an immutable, named release pointing at this exact
        # commit. The binaries are byte-identical to the rolling build for the
        # same commit (same env, same runner); their `--version` reports the
        # clean tag (e.g. `v1.2.0`) because we stamped HYPERION_DESCRIBE above.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Versioned release — `${{ github.ref_name }}`.

            - **version**: `${{ steps.meta.outputs.describe }}`
            - **commit**: `${{ github.sha }}` (`${{ steps.meta.outputs.short_sha }}`)
            - **built**: ${{ steps.meta.outputs.build_date }}
            - **runner**: ubuntu-22.04 · glibc 2.35
            - **target**: x86_64-unknown-linux-gnu (Debian 12+ compatible)

            Cut a release with `git tag ${{ github.ref_name }} && git push --tags`.
            Operators on the rolling channel pull `main` via
            `sudo /opt/hyperion/packaging/install/update.sh` and don't need to
            pin a tag — this release is the human milestone marker that names
            the version `--version` and the cluster version-skew pill report.

            **Checksums** (`SHA256SUMS`) are uploaded alongside the binaries.
          files: |
            dist/hyperion-agent
            dist/hyperion-web
            dist/hctl
            dist/SHA256SUMS
            dist/VERSION
          draft: false
          prerelease: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
