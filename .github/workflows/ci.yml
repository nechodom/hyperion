name: CI

# Gates every PR (and pushes to main) on what the project actually maintains:
# the workspace must build and the test suite must pass. release.yml only builds
# the three shipped binaries; this also compiles + runs all tests (catching e.g.
# a test regression before it reaches the rolling release).
#
# fmt + clippy run too, but as INFORMATIONAL (continue-on-error) steps: the
# codebase predates any lint gating and isn't yet rustfmt-clean nor free of the
# crate-level deny(unwrap_used/expect_used) violations clippy surfaces. Making
# them blocking would red every build for pre-existing debt. They stay visible
# in the log so the debt can be paid down over time, then flipped to blocking.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Newer PR commits supersede older runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # ---- Blocking gates ----
      - name: Tests
        run: cargo test --workspace

      - name: Build (release — mirrors the rolling release)
        run: cargo build --workspace --release

      # ---- Informational (do not fail the build yet) ----
      - name: Format check (informational)
        run: cargo fmt --all --check
        continue-on-error: true

      - name: Clippy (informational)
        run: cargo clippy --workspace --all-targets
        continue-on-error: true
