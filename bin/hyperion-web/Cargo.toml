[package]
name = "hyperion-web"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "hyperion-web"
path = "src/main.rs"

[dependencies]
hyperion-rpc = { path = "../../crates/hyperion-rpc" }
hyperion-rpc-client = { path = "../../crates/hyperion-rpc-client" }
hyperion-import = { path = "../../crates/hyperion-import" }
hyperion-types = { path = "../../crates/hyperion-types" }
hyperion-validate = { path = "../../crates/hyperion-validate" }
hyperion-auth = { path = "../../crates/hyperion-auth" }
# Pure RBAC types (Capability/CapSet, WebRole) for AuthCtx::can() — no DB pool
# is opened here; the web layer still does all state I/O over RPC.
hyperion-state = { path = "../../crates/hyperion-state" }
# Needed for master_rpc::MasterRpcSigner (master→node RPC signing
# key loaded at startup, used by dispatcher::dispatch_to_node).
hyperion-core = { path = "../../crates/hyperion-core" }
tokio = { workspace = true }
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
clap.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
askama.workspace = true
axum.workspace = true
axum-server = { version = "0.7", features = ["tls-rustls"] }
rcgen.workspace = true
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "logging"] }
tower.workspace = true
tower-http.workspace = true
tokio-util = { version = "0.7", features = ["io"] }
url.workspace = true
chrono.workspace = true
http-body-util.workspace = true
once_cell.workspace = true
subtle.workspace = true
async-trait.workspace = true
ulid.workspace = true
thiserror.workspace = true
blake3.workspace = true
hex.workspace = true
askama_escape = "0.10"
qrcode = { version = "0.14", default-features = false, features = ["svg"] }
base64 = { workspace = true }
regex.workspace = true
rand.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
tempfile.workspace = true
async-trait.workspace = true
hyperion-adapters = { path = "../../crates/hyperion-adapters" }
hyperion-state = { path = "../../crates/hyperion-state" }
hyperion-rpc-server = { path = "../../crates/hyperion-rpc-server" }
rand.workspace = true
http-body-util.workspace = true
