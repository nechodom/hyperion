<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ code }} {{ title }} · Hyperion</title>
  <link rel="stylesheet" href="/static/app.css?v={{ css_version }}">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%236366f1'/%3E%3Cpath d='M9 9 L9 23 M9 16 L17 16 M17 9 L17 23 M21 14 L24 14 L24 23 M21 11 L21 14' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
  <style>
    /* Standalone styles so the page renders correctly even when the
       app stylesheet is unavailable (CDN miss, agent down, etc.). */
    :root {
      --bg: #0b0e15;
      --surface: #131826;
      --surface-1: #1a2034;
      --border: #2a3148;
      --text: #e6eaf3;
      --text-soft: #98a0b3;
      --accent: #6366f1;
      --danger: #ef4444;
      --warn: #f59e0b;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f8fb;
        --surface: #ffffff;
        --surface-1: #f0f2f7;
        --border: #d9dde7;
        --text: #14171f;
        --text-soft: #586071;
        --accent: #6366f1;
        --danger: #dc2626;
        --warn: #c2740a;
      }
    }
    .err-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.55 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .err-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 38rem;
      width: 100%;
      padding: 2rem 2.2rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.30);
    }
    .err-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 0.6rem;
    }
    .err-eyebrow .err-code {
      background: var(--surface-1);
      border: 1px solid var(--border);
      padding: 0.15rem 0.45rem;
      border-radius: 6px;
      color: var(--text);
      font-feature-settings: "tnum";
    }
    .err-headline {
      font-size: 1.45rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      letter-spacing: -0.01em;
    }
    .err-body {
      color: var(--text-soft);
      margin: 0 0 1.2rem;
      word-break: break-word;
    }
    .err-hints {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1.1rem 0.9rem 2rem;
      margin: 0 0 1.4rem;
      color: var(--text-soft);
      font-size: 0.92rem;
    }
    .err-hints li { margin: 0.15rem 0; }
    .err-actions {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
    }
    .err-btn {
      display: inline-block;
      padding: 0.55rem 1.05rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.92rem;
    }
    .err-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .err-btn:hover { filter: brightness(1.08); }
    .err-brand {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--text-soft);
      letter-spacing: 0.05em;
      text-align: center;
    }
    .err-brand strong {
      color: var(--accent);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body class="err-page">
  <div class="err-card" role="alert" aria-live="polite">
    <div class="err-eyebrow">
      <span class="err-code">{{ code }}</span>
      <span>{{ title }}</span>
    </div>
    <h1 class="err-headline">{{ headline }}</h1>
    <p class="err-body">{{ body }}</p>
    {% if !hints.is_empty() %}
    <ul class="err-hints">
      {% for h in hints %}
      <li>{{ h }}</li>
      {% endfor %}
    </ul>
    {% endif %}
    <div class="err-actions">
      {% match action %}
      {% when Some with ((label, href)) %}
        <a class="err-btn primary" href="{{ href }}">{{ label }}</a>
      {% when None %}
      {% endmatch %}
      <a class="err-btn" href="/">Back to dashboard</a>
    </div>
    <div class="err-brand"><strong>HY · PERION</strong></div>
  </div>
</body>
</html>
