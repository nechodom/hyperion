<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}hyperion{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="color-scheme" content="light dark">
</head>
<body>
{% block nav %}
<nav class="nav">
  <a class="brand" href="/"><span class="accent">hyp</span>·erion</a>
  <a href="/">Dashboard</a>
  <a href="/hostings">Hostings</a>
  <a href="/audit">Audit</a>
  <span class="grow"></span>
  <span class="user">signed in as <b>{{ username }}</b></span>
  <form method="post" action="/logout" style="margin:0">
    <button class="btn small" type="submit">Sign out</button>
  </form>
</nav>
{% endblock %}

<main class="main">
{% block main %}{% endblock %}
</main>

<footer>hyperion · admin</footer>

<script src="/static/htmx.min.js" defer></script>
</body>
</html>
