[package]
name = "hyperion-agent"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "hyperion-agent"
path = "src/main.rs"

[dependencies]
hyperion-core = { path = "../../crates/hyperion-core" }
hyperion-import = { path = "../../crates/hyperion-import" }
hyperion-rpc = { path = "../../crates/hyperion-rpc" }
hyperion-rpc-server = { path = "../../crates/hyperion-rpc-server" }
hyperion-state = { path = "../../crates/hyperion-state" }
hyperion-types = { path = "../../crates/hyperion-types" }
tokio = { workspace = true }
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
clap.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
toml_edit.workspace = true
chrono.workspace = true
axum.workspace = true
axum-server = { version = "0.7", features = ["tls-rustls"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "logging"] }
rcgen.workspace = true

[dev-dependencies]
tempfile.workspace = true
