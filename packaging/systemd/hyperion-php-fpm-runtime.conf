# systemd-tmpfiles snippet: per-version /run/php subdirs for hyperion.
#
# Hyperion's PHP-FPM pools listen on:
#   /run/php/<version>/<system_user>.sock
# e.g. /run/php/8.3/test_user.sock
#
# Debian's php-fpm package only creates /run/php (via its own tmpfiles
# snippet) — not per-version subdirs. /run/ is tmpfs and wiped on every
# reboot, so without this snippet PHP-FPM would fail to open its socket
# after reboot and nginx would return 502 Bad Gateway.
#
# systemd runs systemd-tmpfiles-setup.service BEFORE php8.x-fpm.service
# so by the time fpm starts, these dirs exist.
#
# Type Path           Mode Owner Group Age Argument
d /run/php       0755 root  root  -
d /run/php/8.1   0755 root  root  -
d /run/php/8.2   0755 root  root  -
d /run/php/8.3   0755 root  root  -
d /run/php/8.4   0755 root  root  -
